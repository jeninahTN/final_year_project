<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Market Pulse</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2ecc71">
</head>

<body>
    <header>
        <div class="container nav-wrapper">
            <a href="/" class="logo">
                <i class="fas fa-layer-group logo-icon"></i>
                Market Pulse
            </a>
            <nav class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}"
                    data-i18n="nav_home">Home</a>
                <a href="/ussd" class="nav-link {% if request.url.path == '/ussd' %}active{% endif %}"
                    data-i18n="nav_ussd">USSD Service</a>
                <a href="/offline" class="nav-link {% if request.url.path == '/offline' %}active{% endif %}"
                    data-i18n="nav_offline">Offline
                    App</a>
                <a href="/help" class="nav-link {% if request.url.path == '/help' %}active{% endif %}"
                    data-i18n="nav_help">Help</a>
            </nav>
            <div class="user-profile">
                <select id="language-selector"
                    style="padding: 8px; border-radius: 20px; border: 1px solid #ddd; background: #f8f9fa; font-weight: 500; cursor: pointer; outline: none;">
                    <option value="en">🇬🇧 English</option>
                    <option value="lg">🇺🇬 Luganda</option>
                </select>
                {% if request.url.path != '/login' %}
                <a href="/login" class="btn-primary" style="padding: 8px 20px;" data-i18n="nav_login">Login</a>
                {% endif %}
            </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer style="background: white; padding: 40px 0; margin-top: 60px; border-top: 1px solid #eee;">
        <div class="container" style="text-align: center; color: var(--text-muted);">
            <p data-i18n="footer_rights">&copy; 2024 Market Pulse Uganda. All rights reserved.</p>
            <div style="margin-top: 10px; font-size: 0.9rem;">
                <a href="#" style="margin: 0 10px;" data-i18n="footer_terms">Terms</a>
                <a href="#" style="margin: 0 10px;" data-i18n="footer_privacy">Privacy</a>
                <a href="/help" style="margin: 0 10px;" data-i18n="footer_contact">Contact</a>
            </div>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
